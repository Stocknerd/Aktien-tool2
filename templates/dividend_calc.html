<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dividenden-Rechner | Schatzsuche 4.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/dividend.css') }}" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e293b;
            border-radius: 12px;
            margin-top: 5px;
            z-index: 1000;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
        }
        .search-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .search-item:hover {
            background: rgba(16, 185, 129, 0.1);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">SCHATZSUCHE 4.0</a>
            <div class="ms-auto">
                <a href="/" class="btn btn-outline-light btn-sm rounded-pill">Zurück zum Vergleich</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="calc-container">
            <div class="calc-header">
                <h1>Dividenden-Rechner</h1>
                <p class="text-muted">Berechne dein passives Einkommen mit deinen Lieblingsaktien.</p>
            </div>

            <div class="input-section">
                <div class="form-group position-relative">
                    <label for="stockSearch">Aktie suchen</label>
                    <input type="text" id="stockSearch" placeholder="Name oder Ticker (z.B. Apple)..." autocomplete="off">
                    <div id="searchResults" class="search-results"></div>
                    <input type="hidden" id="selectedTicker">
                </div>
                <div class="form-group">
                    <label for="investAmount">Investitionsbetrag (€)</label>
                    <input type="number" id="investAmount" value="1000" step="100" min="0">
                </div>
            </div>

            <div id="results" class="results-grid" style="display: none;">
                <div class="result-card">
                    <span class="label">Jährliche Dividende</span>
                    <span id="annualDiv" class="value">0,00 €</span>
                </div>
                <div class="result-card">
                    <span class="label">Monatlich (Ø)</span>
                    <span id="monthlyDiv" class="value monthly">0,00 €</span>
                </div>
                <div class="result-card">
                    <span class="label">Aktienanteile</span>
                    <span id="shareCount" class="value shares">0</span>
                </div>
                <div class="result-card">
                    <span class="label">Rendite</span>
                    <span id="divYield" class="value text-info">0,0 %</span>
                </div>
            </div>

            <div class="share-section" id="shareBox" style="display: none;">
                <p class="text-muted small">Teile dieses Ergebnis oder speichere es für später:</p>
                <button class="btn-share" id="copyBtn">Link kopieren</button>
            </div>
        </div>
    </div>

    <script>
        const stockSearch = document.getElementById('stockSearch');
        const searchResults = document.getElementById('searchResults');
        const selectedTicker = document.getElementById('selectedTicker');
        const investAmount = document.getElementById('investAmount');
        const results = document.getElementById('results');
        const shareBox = document.getElementById('shareBox');

        let debounceTimer;

        stockSearch.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            const query = e.target.value.trim();
            if (query.length < 2) {
                searchResults.style.display = 'none';
                return;
            }

            debounceTimer = setTimeout(() => {
                fetch(`/api/search?q=${encodeURIComponent(query)}`)
                    .then(r => r.json())
                    .then(data => {
                        searchResults.innerHTML = '';
                        if (data.length > 0) {
                            data.forEach(item => {
                                const div = document.createElement('div');
                                div.className = 'search-item';
                                div.innerHTML = `<strong>${item.symbol}</strong> - ${item.name}`;
                                div.onclick = () => selectStock(item);
                                searchResults.appendChild(div);
                            });
                            searchResults.style.display = 'block';
                        } else {
                            searchResults.style.display = 'none';
                        }
                    });
            }, 300);
        });

        function selectStock(item) {
            stockSearch.value = item.name;
            selectedTicker.value = item.symbol;
            searchResults.style.display = 'none';
            calculate();
        }

        investAmount.addEventListener('input', calculate);

        function calculate() {
            const ticker = selectedTicker.value;
            const amount = investAmount.value;
            if (!ticker || !amount) return;

            fetch(`/api/calculate-dividend?ticker=${ticker}&amount=${amount}`)
                .then(r => r.json())
                .then(data => {
                    if (data.error) return;
                    
                    document.getElementById('annualDiv').innerText = data.annual.toLocaleString('de-DE', { style: 'currency', currency: 'EUR' });
                    document.getElementById('monthlyDiv').innerText = data.monthly.toLocaleString('de-DE', { style: 'currency', currency: 'EUR' });
                    document.getElementById('shareCount').innerText = data.shares.toFixed(2);
                    document.getElementById('divYield').innerText = data.yield + ' %';
                    
                    results.style.display = 'grid';
                    shareBox.style.display = 'block';
                });
        }

        document.getElementById('copyBtn').onclick = () => {
            const url = new URL(window.location.href);
            url.searchParams.set('ticker', selectedTicker.value);
            url.searchParams.set('amount', investAmount.value);
            navigator.clipboard.writeText(url.toString()).then(() => {
                const btn = document.getElementById('copyBtn');
                const oldText = btn.innerText;
                btn.innerText = 'Kopiert!';
                btn.style.background = '#059669';
                setTimeout(() => {
                    btn.innerText = oldText;
                    btn.style.background = '#10b981';
                }, 2000);
            });
        };

        // Initial check for URL params
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has('ticker')) {
                selectedTicker.value = params.get('ticker');
                investAmount.value = params.get('amount') || 1000;
                // Fetch info for the ticker to show name
                fetch(`/api/search?q=${params.get('ticker')}`)
                    .then(r => r.json())
                    .then(data => {
                        if (data.length > 0) {
                            stockSearch.value = data[0].name;
                            calculate();
                        }
                    });
            }
        };
    </script>
</body>
</html>
