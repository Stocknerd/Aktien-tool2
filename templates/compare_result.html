<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vergleich {{ t1 }} vs {{ t2 }} | Schatzsuche 4.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --accent: #10b981; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; padding: 40px 16px; display: flex; flex-direction: column; align-items: center; }
        .result-img { max-width: 100%; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        .actions { margin-top: 30px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .btn-success { background: var(--accent); border: none; font-weight: 700; padding: 12px 25px; border-radius: 10px; }
        .btn-outline-light { border-radius: 10px; padding: 12px 25px; }
        {% if is_embedded %}
        body { background: transparent !important; padding: 0 !important; }
        .result-img { box-shadow: none !important; border-radius: 14px; width: 100%; }
        /* Show actions for landing pages, even if embedded */
        .actions { margin-top: 15px; }
        .actions .btn { padding: 8px 15px; font-size: 0.9rem; }
        {% endif %}
    </style>
</head>
<body>
    <img src="{{ url_for('generated_file', filename=fname) }}" class="result-img" alt="Vergleich {{ t1 }} vs {{ t2 }}">
    
    <!-- Interactive TradingView Side-by-Side Charts Widget -->
    <div class="row w-100 mt-5 g-4" style="max-width: 1200px; margin: 0 auto; padding: 0 16px;">
        {% if t1 %}
        <div class="col-12 col-md-6">
            <h5 class="text-uppercase tracking-wider mb-3 text-center" style="color: #64748b; font-size: 0.8rem; letter-spacing: 0.1em; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <span>📈</span> Echtzeit-Chart für {{ t1 }}
            </h5>
            <div class="tradingview-widget-container" style="height: 400px; width: 100%; border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
              <div id="tradingview_chart_t1" style="height: 100%;"></div>
            </div>
        </div>
        {% endif %}
        
        {% if t2 %}
        <div class="col-12 col-md-6">
            <h5 class="text-uppercase tracking-wider mb-3 text-center" style="color: #64748b; font-size: 0.8rem; letter-spacing: 0.1em; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <span>📈</span> Echtzeit-Chart für {{ t2 }}
            </h5>
            <div class="tradingview-widget-container" style="height: 400px; width: 100%; border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
              <div id="tradingview_chart_t2" style="height: 100%;"></div>
            </div>
        </div>
        {% endif %}
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
    function createWidget(symbol, containerId) {
        let tvSymbol = symbol;
        if (tvSymbol.endsWith(".DE")) {
            tvSymbol = "XETR:" + tvSymbol.replace(".DE", "");
        } else if (tvSymbol.endsWith(".F")) {
            tvSymbol = "FWB:" + tvSymbol.replace(".F", "");
        }

        new TradingView.widget({
            "width": "100%",
            "height": 400,
            "symbol": tvSymbol,
            "interval": "D",
            "timezone": "Europe/Berlin",
            "theme": "dark",
            "style": "1",
            "locale": "de",
            "enable_publishing": false,
            "hide_side_toolbar": true,
            "allow_symbol_change": true,
            "container_id": containerId
        });
    }

    {% if t1 %}
    createWidget("{{ t1 }}", "tradingview_chart_t1");
    {% endif %}
    {% if t2 %}
    createWidget("{{ t2 }}", "tradingview_chart_t2");
    {% endif %}
    </script>
    
    <div class="actions">
        <a href="/" class="btn btn-outline-light" style="opacity: 0.8; border: 1px solid rgba(255,255,255,0.2);">🏠 Home</a>
        <a href="/compare?t1={{ t1 }}&t2={{ t2 }}&metrics={{ m_param }}" class="btn btn-outline-light">✎ Editieren</a>
        <a href="/compare" class="btn btn-outline-light">🔍 Neuer Vergleich</a>
        <a href="{{ url_for('download_image', filename=fname) }}" class="btn btn-success">⬇ PNG Download</a>
    </div>

    <script>
        function postHeight() {
            if (window.parent) {
                const h = document.documentElement.scrollHeight;
                window.parent.postMessage({ type: 'setHeight', height: h }, '*');
            }
        }
        window.onload = postHeight;
    </script>
</body>
</html>
