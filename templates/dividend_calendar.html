<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dividenden-Kalender 2026 | Schatzsuche 4.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.5);
            --accent: #10b981;
            --accent-hover: #059669;
            --text-muted: #94a3b8;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px 0;
            {% if is_embedded %} background: transparent !important; {% endif %}
        }

        .calendar-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-section h1 {
            font-weight: 800;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .filter-bar {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            padding: 10px 20px;
            flex: 1;
            min-width: 250px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        .div-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .div-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 25px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .div-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            background: rgba(30, 41, 59, 0.7);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .div-card .ticker {
            font-weight: 800;
            color: var(--accent);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 5px;
        }

        .div-card .name {
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .div-card .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .div-card .info-label {
            color: var(--text-muted);
        }

        .div-card .info-value {
            font-weight: 600;
        }

        .countdown-tag {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 20px;
        }

        .countdown-tag.urgent {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .broker-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            text-decoration: none;
            text-align: center;
            margin-top: auto;
            transition: 0.2s;
        }

        .broker-btn:hover {
            background: var(--accent-hover);
            color: white;
            transform: scale(1.02);
        }

        #loader {
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="calendar-container">
    <div class="header-section">
        <h1>Dividenden-Kalender</h1>
        <p>Verpasse nie wieder einen Ex-Tag. Die nächsten Ausschüttungen im Blick.</p>
    </div>

    <div class="filter-bar">
        <input type="text" id="searchInput" class="search-input" placeholder="Aktie suchen (z.B. Apple, BMW)...">
        <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm rounded-pill px-3 filter-btn" data-filter="high-yield">Hohe Rendite (>4%)</button>
            <button class="btn btn-outline-secondary btn-sm rounded-pill px-3 filter-btn" data-filter="this-week">Diese Woche</button>
        </div>
    </div>

    <div id="loader">
        <div class="spinner-border text-success" role="status"></div>
        <div class="mt-2">Lade Kalender-Daten...</div>
    </div>

    <div id="divGrid" class="div-grid"></div>
    <div id="emptyState" class="empty-state" style="display:none;">
        <h3>Keine Treffer gefunden.</h3>
        <p>Versuche es mit einem anderen Suchbegriff oder Filter.</p>
    </div>
</div>

<script>
    let allData = [];
    const grid = document.getElementById('divGrid');
    const loader = document.getElementById('loader');
    const emptyState = document.getElementById('emptyState');
    const searchInput = document.getElementById('searchInput');

    async function fetchData() {
        try {
            const res = await fetch('/api/dividenden-kalender');
            allData = await res.json();
            renderData(allData);
            loader.style.display = 'none';
        } catch (e) {
            console.error(e);
            loader.innerText = "Fehler beim Laden der Daten.";
        }
    }

    function getDaysUntil(dateStr) {
        const target = new Date(dateStr);
        const today = new Date();
        today.setHours(0,0,0,0);
        const diffTime = target - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        return diffDays;
    }

    function renderData(data) {
        grid.innerHTML = '';
        if (data.length === 0) {
            emptyState.style.display = 'block';
            return;
        }
        emptyState.style.display = 'none';

        data.forEach(item => {
            const days = getDaysUntil(item.ex_date);
            const countdownText = days === 0 ? "Heute (Ex-Tag!)" : (days === 1 ? "Morgen" : `In ${days} Tagen`);
            const isUrgent = days <= 3;

            const card = document.createElement('div');
            card.className = 'div-card';
            card.innerHTML = `
                <div class="ticker">${item.symbol}</div>
                <div class="name">${item.name}</div>
                <div class="countdown-tag ${isUrgent ? 'urgent' : ''}">${countdownText}</div>
                
                <div class="info-row">
                    <span class="info-label">Ex-Datum:</span>
                    <span class="info-value">${new Date(item.ex_date).toLocaleDateString('de-DE')}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Rendite (p.a.):</span>
                    <span class="info-value" style="color: #10b981">${(item.yield * 100).toFixed(2)} %</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Ausschüttung:</span>
                    <span class="info-value">${item.amount.toFixed(2)} ${item.currency}</span>
                </div>

                <a href="https://trade.re/p/schatzsuche" target="_blank" class="broker-btn">Bei Trade Republic kaufen*</a>
            `;
            grid.appendChild(card);
        });
    }

    searchInput.addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        const filtered = allData.filter(d => 
            d.symbol.toLowerCase().includes(q) || 
            d.name.toLowerCase().includes(q)
        );
        renderData(filtered);
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const f = btn.dataset.filter;
            btn.classList.toggle('active');
            btn.classList.toggle('btn-success');
            btn.classList.toggle('btn-outline-secondary');

            let filtered = [...allData];
            if (f === 'high-yield') {
                filtered = filtered.filter(d => d.yield >= 0.04);
            } else if (f === 'this-week') {
                filtered = filtered.filter(d => getDaysUntil(d.ex_date) <= 7);
            }
            renderData(filtered);
        });
    });

    fetchData();

    // iFrame Resize handling
    if (window.parent !== window) {
        function sendHeight() {
            const h = document.documentElement.scrollHeight;
            window.parent.postMessage({ type: 'setHeight', height: h }, '*');
        }
        window.addEventListener('load', sendHeight);
        new ResizeObserver(sendHeight).observe(document.body);
    }
</script>

</body>
</html>
