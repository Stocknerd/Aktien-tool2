<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dividenden-Kalender 2026 | Schatzsuche 4.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.6);
            --accent: #10b981;
            --accent-hover: #059669;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            {% if is_embedded %} background: transparent !important; {% endif %}
        }

        .calendar-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header-section {
            text-align: left;
            margin-bottom: 40px;
            border-left: 4px solid var(--accent);
            padding-left: 20px;
        }

        .header-section h1 {
            font-weight: 800;
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        .header-section p {
            color: var(--text-muted);
            margin: 0;
        }

        /* Monats-Filter */
        .month-filters {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 15px;
            margin-bottom: 25px;
            scrollbar-width: thin;
        }

        .month-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            transition: 0.2s;
        }

        .month-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .month-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* Tabelle */
        .table-container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        .div-table {
            width: 100%;
            border-collapse: collapse;
        }

        .div-table th {
            background: rgba(0,0,0,0.2);
            padding: 15px 20px;
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
        }

        .div-table th:hover {
            color: white;
            background: rgba(255,255,255,0.05);
        }

        .div-table th i {
            margin-left: 5px;
            font-size: 0.7rem;
        }

        .div-table td {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
            vertical-align: middle;
        }

        .div-table tr:last-child td {
            border-bottom: none;
        }

        .div-table tr:hover {
            background: rgba(255,255,255,0.02);
        }

        .stock-name-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ticker-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 800;
        }

        .yield-value {
            color: var(--accent);
            font-weight: 700;
        }

        .amount-value {
            font-weight: 600;
        }

        .date-cell {
            font-family: monospace;
            font-weight: 600;
        }

        .action-cell {
            text-align: right;
        }

        .buy-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            text-decoration: none;
            transition: 0.2s;
        }

        .buy-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* Mobile View */
        @media (max-width: 768px) {
            .div-table thead { display: none; }
            .div-table td {
                display: block;
                text-align: right;
                padding: 10px 20px;
                border-bottom: none;
            }
            .div-table td::before {
                content: attr(data-label);
                float: left;
                color: var(--text-muted);
                font-size: 0.8rem;
                font-weight: 600;
                text-transform: uppercase;
            }
            .div-table td.stock-name-cell {
                text-align: left;
                background: rgba(255,255,255,0.05);
                padding: 15px 20px;
                display: flex;
                justify-content: space-between;
            }
            .div-table td.stock-name-cell::before { display: none; }
            .div-table tr {
                display: block;
                border-bottom: 2px solid var(--border);
                margin-bottom: 10px;
            }
            .action-cell {
                text-align: center;
                padding: 15px 20px !important;
            }
            .buy-btn {
                width: 100%;
                display: block;
            }
        }

        #loader { text-align: center; padding: 100px; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="calendar-container">
    <div class="header-section">
        <h1>Dividenden-Kalender</h1>
        <p>Alle anstehenden Ausschüttungen in der Übersicht.</p>
    </div>

    <div class="month-filters" id="monthFilters">
        <button class="month-btn active" data-month="all">Alle</button>
        <button class="month-btn" data-month="1">Jan</button>
        <button class="month-btn" data-month="2">Feb</button>
        <button class="month-btn" data-month="3">Mär</button>
        <button class="month-btn" data-month="4">Apr</button>
        <button class="month-btn" data-month="5">Mai</button>
        <button class="month-btn" data-month="6">Jun</button>
        <button class="month-btn" data-month="7">Jul</button>
        <button class="month-btn" data-month="8">Aug</button>
        <button class="month-btn" data-month="9">Sep</button>
        <button class="month-btn" data-month="10">Okt</button>
        <button class="month-btn" data-month="11">Nov</button>
        <button class="month-btn" data-month="12">Dez</button>
    </div>

    <div class="table-container">
        <div id="loader">
            <div class="spinner-border text-success" role="status"></div>
            <div class="mt-3">Lade Marktdaten...</div>
        </div>
        
        <table class="div-table" id="divTable" style="display: none;">
            <thead>
                <tr>
                    <th onclick="sortTable(0)">Aktie <i class="bi bi-arrow-down-up"></i></th>
                    <th onclick="sortTable(1)">Ex-Datum <i class="bi bi-arrow-down-up"></i></th>
                    <th onclick="sortTable(2)">Rendite <i class="bi bi-arrow-down-up"></i></th>
                    <th onclick="sortTable(3)">Betrag <i class="bi bi-arrow-down-up"></i></th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="divBody"></tbody>
        </table>
    </div>
</div>

<script>
    let allData = [];
    const body = document.getElementById('divBody');
    const table = document.getElementById('divTable');
    const loader = document.getElementById('loader');

    async function fetchData() {
        try {
            const res = await fetch('/api/dividenden-kalender');
            allData = await res.json();
            renderData(allData);
            loader.style.display = 'none';
            table.style.display = 'table';
        } catch (e) {
            console.error(e);
            loader.innerText = "Fehler beim Laden der Daten.";
        }
    }

    function renderData(data) {
        body.innerHTML = '';
        data.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="stock-name-cell" data-label="Aktie">
                    <div>
                        <div style="font-weight: 700;">${item.name}</div>
                        <span class="ticker-badge">${item.symbol}</span>
                    </div>
                </td>
                <td class="date-cell" data-label="Ex-Datum">
                    ${new Date(item.ex_date).toLocaleDateString('de-DE')}
                </td>
                <td class="yield-value" data-label="Rendite">
                    ${(item.yield).toFixed(2)} %
                </td>
                <td class="amount-value" data-label="Betrag">
                    ${item.amount.toFixed(2)} ${item.currency}
                </td>
                <td class="action-cell">
                    <a href="https://trade.re/p/schatzsuche" target="_blank" class="buy-btn">Kaufen</a>
                </td>
            `;
            body.appendChild(row);
        });
    }

    // Monats-Filter Logik
    document.querySelectorAll('.month-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const month = btn.dataset.month;
            if (month === 'all') {
                renderData(allData);
            } else {
                const filtered = allData.filter(d => {
                    const dDate = new Date(d.ex_date);
                    return (dDate.getMonth() + 1) == month;
                });
                renderData(filtered);
            }
        });
    });

    // Sortier Logik
    let sortOrders = [true, true, true, true];
    function sortTable(n) {
        const dir = sortOrders[n] ? 1 : -1;
        sortOrders[n] = !sortOrders[n];
        
        allData.sort((a, b) => {
            let valA, valB;
            if (n === 0) { valA = a.name; valB = b.name; }
            if (n === 1) { valA = new Date(a.ex_date); valB = new Date(b.ex_date); }
            if (n === 2) { valA = a.yield; valB = b.yield; }
            if (n === 3) { valA = a.amount; valB = b.amount; }
            
            if (valA < valB) return -1 * dir;
            if (valA > valB) return 1 * dir;
            return 0;
        });
        renderData(allData);
    }

    fetchData();

    // iFrame Resize handling
    if (window.parent !== window) {
        function sendHeight() {
            const h = document.documentElement.scrollHeight;
            window.parent.postMessage({ type: 'setHeight', height: h }, '*');
        }
        window.addEventListener('load', sendHeight);
        new ResizeObserver(sendHeight).observe(document.body);
    }
</script>

</body>
</html>
