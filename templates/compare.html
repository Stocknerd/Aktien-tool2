<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aktien Vergleich | Schatzsuche 4.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --accent: #10b981; --accent-hover: #059669; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; padding: 40px 16px; }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; max-width: 800px; margin: 0 auto; }
        .form-control { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.2); color: white; padding: 12px; border-radius: 10px; }
        .form-control:focus { background: rgba(15, 23, 42, 0.8); border-color: var(--accent); color: white; box-shadow: 0 0 0 0.25rem rgba(16, 185, 129, 0.25); }
        .btn-primary { background: var(--accent); border: none; font-weight: 700; padding: 14px; border-radius: 10px; transition: 0.3s; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); }
        .suggestions { position: absolute; z-index: 1000; background: #1e293b; border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-height: 200px; overflow-y: auto; display: none; margin-top: 5px; border-radius: 10px; }
        .suggestions li { padding: 10px; cursor: pointer; list-style: none; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .suggestions li:hover { background: rgba(255, 255, 255, 0.05); color: var(--accent); }
        {% if is_embedded %}
        body { background: transparent !important; padding: 0 !important; }
        .glass-card { box-shadow: none !important; border: none !important; padding: 10px !important; }
        h1 { display: none; }
        {% endif %}
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <a href="/" class="btn btn-outline-light btn-sm rounded-pill" style="border: 1px solid rgba(255,255,255,0.1);">← Zum Aktientool</a>
            <h1 class="m-0 fw-bold">Aktien Vergleich ⚡</h1>
            <div style="width: 100px;"></div> <!-- Spacer -->
        </div>
        
        <div class="glass-card shadow">
            <form action="{{ url_for('generate_compare') }}" method="get" id="compareForm">
                <input type="hidden" name="embed" value="{{ '1' if is_embedded else '0' }}">
                
                <div class="row g-4 align-items-center mb-4">
                    <div class="col-md-5 position-relative">
                        <label class="form-label text-muted small text-uppercase">Aktie A</label>
                        <input type="text" id="search1" class="form-control" placeholder="Name oder Ticker..." autocomplete="off">
                        <input type="hidden" name="t1" id="t1" value="{{ vt1 }}">
                        <ul id="sugg1" class="suggestions list-group"></ul>
                    </div>
                    
                    <div class="col-md-2 text-center pt-3">
                        <span class="fs-4 fw-bold text-success">VS</span>
                    </div>
                    
                    <div class="col-md-5 position-relative">
                        <label class="form-label text-muted small text-uppercase">Aktie B</label>
                        <input type="text" id="search2" class="form-control" placeholder="Name oder Ticker..." autocomplete="off">
                        <input type="hidden" name="t2" id="t2" value="{{ vt2 }}">
                        <ul id="sugg2" class="suggestions list-group"></ul>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted small text-uppercase">Metriken</label>
                    <select name="metrics_preset" class="form-select bg-dark text-white border-secondary" id="presetSelect">
                        <option value="">Standard (KGV, Margen, Wachstum)</option>
                        <option value="Dividendenrendite,Ausschüttungsquote,KGV,Forward PE,KBV,Operative Marge,Eigenkapitalrendite" {% if vmetrics == 'Dividendenrendite,Ausschüttungsquote,KGV,Forward PE,KBV,Operative Marge,Eigenkapitalrendite' %}selected{% endif %}>Dividenden & Value</option>
                        <option value="Umsatzwachstum 3J (erwartet),PEG-Ratio,Forward PE,Bruttomarge,Operative Marge,ROIC" {% if vmetrics == 'Umsatzwachstum 3J (erwartet),PEG-Ratio,Forward PE,Bruttomarge,Operative Marge,ROIC' %}selected{% endif %}>Wachstum & Tech</option>
                        <option value="custom" {% if vmetrics and vmetrics not in ['Dividendenrendite,Ausschüttungsquote,KGV,Forward PE,KBV,Operative Marge,Eigenkapitalrendite','Umsatzwachstum 3J (erwartet),PEG-Ratio,Forward PE,Bruttomarge,Operative Marge,ROIC'] %}selected{% endif %}>Individuell</option>
                    </select>
                    <input type="text" name="metrics_custom" id="customInput" class="form-control mt-2" style="display:none;" placeholder="KGV, Dividendenrendite, ..." value="{{ vmetrics }}">
                </div>

                <button type="submit" class="btn btn-primary w-100">Vergleichsgrafik erstellen →</button>
            </form>
        </div>
    </div>

    <script>
        function setupAutocomplete(inputId, suggId, hiddenId) {
            const inp = document.getElementById(inputId);
            const list = document.getElementById(suggId);
            const hidden = document.getElementById(hiddenId);

            inp.addEventListener('input', async () => {
                const q = inp.value.trim();
                if (!q) { list.style.display = 'none'; return; }
                const r = await fetch(`/search?q=${encodeURIComponent(q)}`);
                const data = r.ok ? await r.json() : [];
                if (!data.length) { list.style.display = 'none'; return; }
                list.innerHTML = data.map(o => `<li class="list-group-item" data-sym="${o.symbol}">${o.symbol} – ${o.name}</li>`).join('');
                list.style.display = 'block';
            });

            list.addEventListener('click', e => {
                const li = e.target.closest('li');
                if (!li) return;
                inp.value = hidden.value = li.dataset.sym;
                list.style.display = 'none';
            });
        }

        setupAutocomplete('search1', 'sugg1', 't1');
        setupAutocomplete('search2', 'sugg2', 't2');

        const preset = document.getElementById('presetSelect');
        const custom = document.getElementById('customInput');
        preset.addEventListener('change', () => custom.style.display = preset.value === 'custom' ? 'block' : 'none');
        if (preset.value === 'custom') custom.style.display = 'block';
    </script>
</body>
</html>
