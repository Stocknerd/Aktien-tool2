<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aktien Vergleich | Schatzsuche 4.0</title>
    <link rel="canonical" href="{{ request.base_url }}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
          --bg: #0B1E21;
          --surface: rgba(13, 34, 38, 0.85);
          --card: rgba(20, 44, 48, 0.45);
          --border: rgba(201, 162, 39, 0.12);
          --accent: #C9A227;
          --accent-hover: #A8861B;
          --accent-soft: rgba(201, 162, 39, 0.08);
          --blue: #1A535C;
          --text: #F7F7F7;
          --text-secondary: #A0B0B2;
          --shadow: 0 20px 40px rgba(0, 0, 0, 0.65);
        }

        body {
          background-color: var(--bg);
          background-image: 
            radial-gradient(at 0% 0%, rgba(201, 162, 39, 0.04) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(26, 83, 92, 0.05) 0px, transparent 50%);
          color: var(--text);
          font-family: 'Inter', sans-serif;
          min-height: 100vh;
          padding: 40px 16px;
        }

        .glass-card {
          background: var(--surface);
          backdrop-filter: blur(16px);
          -webkit-backdrop-filter: blur(16px);
          border: 1px solid var(--border);
          border-radius: 20px;
          box-shadow: var(--shadow);
          padding: 30px;
          max-width: 800px;
          margin: 0 auto;
        }

        .form-control, .form-select {
          background-color: rgba(0, 0, 0, 0.25);
          border: 1px solid var(--border);
          color: white;
          border-radius: 10px;
          padding: 12px;
          transition: border-color 0.2s;
        }

        .form-control:focus, .form-select:focus {
          background-color: rgba(0, 0, 0, 0.4);
          border-color: var(--accent);
          color: white;
          box-shadow: 0 0 0 0.25rem var(--accent-soft);
        }

        .btn-primary {
          background-color: var(--accent);
          border: none;
          font-weight: 700;
          padding: 14px;
          border-radius: 10px;
          transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
          box-shadow: 0 4px 10px rgba(201, 162, 39, 0.25);
          color: #0B1E21 !important;
        }

        .btn-primary:hover {
          background-color: #A8861B;
          transform: translateY(-2px);
          box-shadow: 0 10px 15px rgba(201, 162, 39, 0.4);
        }

        .suggestions {
          position: absolute;
          z-index: 1000;
          background: #0B1E21;
          border: 1px solid var(--border);
          width: 100%;
          max-height: 200px;
          overflow-y: auto;
          display: none;
          margin-top: 5px;
          border-radius: 12px;
          padding: 0;
        }

        .suggestions li {
          padding: 10px 16px;
          cursor: pointer;
          list-style: none;
          color: white;
          border-bottom: 1px solid var(--border);
          font-size: 0.88rem;
          transition: background 0.15s;
        }

        .suggestions li:hover {
          background: var(--accent-soft);
          color: var(--accent);
        }

        /* Unified Navigation Bar styling */
        .nav-actions {
          display: flex;
          gap: 10px;
          justify-content: center;
          flex-wrap: wrap;
          margin-bottom: 30px;
        }
        @media (max-width: 576px) {
          .nav-actions {
            gap: 6px !important;
            margin-bottom: 15px !important;
          }
          .nav-actions .btn {
            padding: 4px 10px !important;
            font-size: 0.75rem !important;
          }
        }

        {% if is_embedded %}
        body { background: transparent !important; padding: 0 !important; }
        .glass-card { box-shadow: none !important; border: none !important; padding: 10px !important; }
        h1 { display: none; }
        .nav-actions { display: none !important; }
        {% endif %}
    </style>
</head>
<body data-embedded="{{ '1' if is_embedded else '0' }}">
    <div class="container">
        {% if not is_embedded %}
        <!-- Unified Top Navigation Header -->
        <div class="nav-actions">
            <a href="/" class="btn btn-outline-light btn-sm rounded-pill px-3" style="border: 1px solid rgba(255,255,255,0.1); font-weight:600;">🏠 Home</a>
            <a href="/screener" class="btn btn-outline-light btn-sm rounded-pill px-3" style="border: 1px solid rgba(255,255,255,0.1); font-weight:600;">🎯 Screener</a>
            <a href="/dividenden-kalender" class="btn btn-outline-light btn-sm rounded-pill px-3" style="border: 1px solid rgba(255,255,255,0.1); font-weight:600;">📅 Kalender</a>
            <a href="/compare" class="btn btn-outline-success btn-sm rounded-pill px-3" style="border: 1px solid rgba(16, 185, 129, 0.3); color: #10b981; font-weight:600;">📊 Vergleich</a>
            <a href="/p2p" class="btn btn-outline-light btn-sm rounded-pill px-3" style="border: 1px solid rgba(255,255,255,0.1); font-weight:600;">💳 P2P</a>
            <a href="/dividend-rechner" class="btn btn-outline-light btn-sm rounded-pill px-3" style="border: 1px solid rgba(255,255,255,0.1); font-weight:600;">💰 Rechner</a>
            <a href="/watchlist" class="btn btn-outline-warning btn-sm rounded-pill px-3" style="border: 1px solid rgba(201, 162, 39, 0.3); color: #C9A227; font-weight:600;">⭐ Watchlist</a>
        </div>
        {% endif %}
        
        <div class="glass-card shadow">
            <div class="text-center mb-4">
                <h1 class="fw-bold m-0" style="background: linear-gradient(135deg, #fff 0%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Aktien-Duell ⚡</h1>
                <p class="text-muted small mt-1">Wähle zwei Aktien aus, um deren Kennzahlen direkt gegenüberzustellen.</p>
            </div>

            <form action="{{ url_for('generate_compare') }}" method="post" id="compareForm">
                <input type="hidden" name="embed" value="{{ '1' if is_embedded else '0' }}">
                
                <div class="row g-4 align-items-center mb-4">
                    <div class="col-md-5 position-relative">
                        <label class="form-label text-muted small text-uppercase fw-bold" style="letter-spacing:0.05em;">Aktie A</label>
                        <input type="text" id="search1" class="form-control" placeholder="Name oder Ticker..." autocomplete="off">
                        <input type="hidden" name="t1" id="t1" value="{{ vt1 }}">
                        <ul id="sugg1" class="suggestions"></ul>
                    </div>
                    
                    <div class="col-md-2 text-center pt-3">
                        <span class="fs-4 fw-bold" style="color: var(--accent); text-shadow: 0 0 10px rgba(16, 185, 129, 0.3);">VS</span>
                    </div>
                    
                    <div class="col-md-5 position-relative">
                        <label class="form-label text-muted small text-uppercase fw-bold" style="letter-spacing:0.05em;">Aktie B</label>
                        <input type="text" id="search2" class="form-control" placeholder="Name oder Ticker..." autocomplete="off">
                        <input type="hidden" name="t2" id="t2" value="{{ vt2 }}">
                        <ul id="sugg2" class="suggestions"></ul>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted small text-uppercase fw-bold" style="letter-spacing:0.05em;">Metriken-Vorlage</label>
                    <select name="metrics_preset" class="form-select" id="presetSelect">
                        <option value="">Standard (KGV, Margen, Wachstum)</option>
                        <option value="Dividendenrendite,Ausschüttungsquote,KGV,Forward PE,KBV,Operative Marge,Eigenkapitalrendite" {% if vmetrics == 'Dividendenrendite,Ausschüttungsquote,KGV,Forward PE,KBV,Operative Marge,Eigenkapitalrendite' %}selected{% endif %}>Dividenden & Value</option>
                        <option value="Umsatzwachstum 3J (erwartet),PEG-Ratio,Forward PE,Bruttomarge,Operative Marge,ROIC" {% if vmetrics == 'Umsatzwachstum 3J (erwartet),PEG-Ratio,Forward PE,Bruttomarge,Operative Marge,ROIC' %}selected{% endif %}>Wachstum & Tech</option>
                        <option value="custom" {% if vmetrics and vmetrics not in ['Dividendenrendite,Ausschüttungsquote,KGV,Forward PE,KBV,Operative Marge,Eigenkapitalrendite','Umsatzwachstum 3J (erwartet),PEG-Ratio,Forward PE,Bruttomarge,Operative Marge,ROIC'] %}selected{% endif %}>Individuell</option>
                    </select>
                    <input type="text" name="metrics_custom" id="customInput" class="form-control mt-2" style="display:none;" placeholder="KGV, Dividendenrendite, ..." value="{{ vmetrics }}">
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-2">Vergleichsgrafik erstellen →</button>
            </form>
        </div>
    </div>

    <script>
        let allStocks = [];

        // Preload stocks array client-side for autocomplete in less than 1ms
        async function loadDatabase() {
            try {
                const res = await fetch('/api/search-all');
                const data = await res.json();
                allStocks = data.stocks || [];
                
                // Initialize autocomplete search actions
                setupAutocomplete('search1', 'sugg1', 't1');
                setupAutocomplete('search2', 'sugg2', 't2');
                
                // Initialize default input displays if ticker values exist
                const t1Val = document.getElementById('t1').value;
                const t2Val = document.getElementById('t2').value;
                if (t1Val) {
                    const st = allStocks.find(s => s.symbol.toUpperCase() === t1Val.toUpperCase());
                    if (st) document.getElementById('search1').value = st.name ? `${st.symbol} – ${st.name}` : st.symbol;
                }
                if (t2Val) {
                    const st = allStocks.find(s => s.symbol.toUpperCase() === t2Val.toUpperCase());
                    if (st) document.getElementById('search2').value = st.name ? `${st.symbol} – ${st.name}` : st.symbol;
                }
            } catch (e) {
                console.error("Could not load stocks database.", e);
            }
        }

        function setupAutocomplete(inputId, suggId, hiddenId) {
            const inp = document.getElementById(inputId);
            const list = document.getElementById(suggId);
            const hidden = document.getElementById(hiddenId);

            inp.addEventListener('input', () => {
                hidden.value = ''; // Clear hidden input on type
                const q = inp.value.trim().toLowerCase();
                list.innerHTML = '';
                if (!q) { list.style.display = 'none'; return; }
                
                const matches = allStocks.filter(s => 
                    s.symbol.toLowerCase().includes(q) || 
                    s.name.toLowerCase().includes(q)
                ).slice(0, 8);

                if (matches.length > 0) {
                    list.innerHTML = matches.map(o => `<li data-sym="${o.symbol}">${o.symbol} – ${o.name}</li>`).join('');
                    list.style.display = 'block';
                } else {
                    list.style.display = 'none';
                }
            });

            list.addEventListener('click', e => {
                const li = e.target.closest('li');
                if (!li) return;
                inp.value = li.innerText;
                hidden.value = li.dataset.sym;
                list.style.display = 'none';
            });

            document.addEventListener('click', e => {
                if (e.target.id !== inputId) {
                    list.style.display = 'none';
                }
            });
        }

        // Loader and Auto-Resolution on manual submit
        document.getElementById('compareForm').addEventListener('submit', async function (e) {
            const t1Input = document.getElementById('t1');
            const t2Input = document.getElementById('t2');
            const search1Input = document.getElementById('search1');
            const search2Input = document.getElementById('search2');
            
            let t1Val = t1Input.value.trim();
            let t2Val = t2Input.value.trim();
            const s1Val = search1Input.value.trim();
            const s2Val = search2Input.value.trim();

            let needsResolve = (!t1Val && s1Val) || (!t2Val && s2Val);

            if (needsResolve) {
                e.preventDefault(); // Pause submit to resolve first
                
                // Helper to resolve one input
                async function resolveInput(searchVal, hiddenInput) {
                    let val = hiddenInput.value.trim();
                    if (val) return val;
                    if (!searchVal) return '';

                    const parts = searchVal.split(' – ');
                    if (parts.length > 1) {
                        return parts[0].trim().toUpperCase();
                    }

                    const exactSym = allStocks.find(s => s.symbol && s.symbol.toUpperCase() === searchVal.toUpperCase());
                    if (exactSym) return exactSym.symbol;

                    const nameMatch = allStocks.find(s => s.name && s.name.toLowerCase() === searchVal.toLowerCase()) ||
                                      allStocks.find(s => s.name && s.name.toLowerCase().includes(searchVal.toLowerCase()));
                    if (nameMatch) return nameMatch.symbol;

                    // Server fallback lookup
                    try {
                        const res = await fetch('/search?q=' + encodeURIComponent(searchVal));
                        if (res.ok) {
                            const matches = await res.json();
                            if (matches.length > 0) return matches[0].symbol;
                        }
                    } catch(err) {
                        console.error("Lookup error", err);
                    }
                    return searchVal; // fallback
                }

                t1Input.value = await resolveInput(s1Val, t1Input);
                t2Input.value = await resolveInput(s2Val, t2Input);
                
                // Now submit form
                this.submit();
                return;
            }

            // Simple validation: both must be present
            if (!t1Input.value || !t2Input.value) {
                e.preventDefault();
                alert('Bitte beide Aktien auswählen.');
                return;
            }

            // UI animation on submit button
            const btn = this.querySelector('button[type="submit"]');
            if (btn) {
                btn.innerHTML = 'Vergleichsgrafik erstellen... <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>';
                btn.style.pointerEvents = 'none';
                btn.style.opacity = '0.8';
            }
        });

        const preset = document.getElementById('presetSelect');
        const custom = document.getElementById('customInput');
        preset.addEventListener('change', () => custom.style.display = preset.value === 'custom' ? 'block' : 'none');
        if (preset.value === 'custom') custom.style.display = 'block';

        // Load database on start
        loadDatabase();
    </script>
    {% include '_tracking.html' %}
</body>
</html>
