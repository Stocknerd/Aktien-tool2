name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq libfreetype6-dev libfontconfig1 fonts-dejavu-core

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-flask black

    - name: Check formatting
      run: |
        black --check . || echo "Format warnings found"

    - name: Ensure test CSV exists
      run: |
        if [ ! -f stock_data.csv ]; then
          echo "Symbol,Security,GICS Sector,valid_yahoo_ticker,resolved_name,resolved_exchange,resolved_score,SourceIndex,Sektor,W\u00e4hrung,Region,Branche,Vortagesschlusskurs,Dividendenrendite,Aussch\u00fcttungsquote,KGV,Forward PE,KBV,KUV,PEG-Ratio,EV/EBITDA,EBIT,Bruttomarge,Operative Marge,Nettomarge,Marktkapitalisierung,Free Cashflow,Free Cashflow Yield,Operativer Cashflow,Eigenkapitalrendite,Return on Assets,ROIC,Umsatzwachstum 3J (erwartet),Empfehlungsdurchschnitt,Anzahl Analystenmeinungen,Analysten_Kursziel,Kursziel_Hoch,Kursziel_Tief,Analysten_Empfehlung,Land,Langname,Verschuldungsgrad,Current Ratio,Gesamtschulden,Beta,52W Hoch,52W Tief,Gewinnwachstum,5Y Dividendenrendite,Abfragedatum,Datenquelle,Datenqualit\u00e4t,Fehlende_Kennzahlen" > stock_data.csv
          echo "AAPL,APPLE INC,Information Technology,AAPL,Apple Inc.,NMS,1000000,SP500,Technology,USD,US,Consumer Electronics,220.0,0.5,0.15,32.0,27.0,42.0,8.5,,24.0,,0.47,0.35,,3700000000000,,,135000000000,1.52,0.24,,0.15,1.9,41,290,350,205,buy,United States,Apple Inc.,102,0.97,90000000000,1.1,288,169,0.18,0.52,2026-03-30,Yahoo Finance,0.9,4" >> stock_data.csv
          echo "MSFT,MICROSOFT CORP,Information Technology,MSFT,Microsoft Corporation,NMS,1000000,SP500,Technology,USD,US,Software,380.0,0.8,0.25,35.0,30.0,12.0,12.0,,22.0,,0.69,0.44,,2800000000000,,,100000000000,0.35,0.17,,0.12,1.8,55,450,500,350,buy,United States,Microsoft Corporation,45,2.5,60000000000,0.9,430,310,0.25,0.9,2026-03-30,Yahoo Finance,0.9,3" >> stock_data.csv
        fi

    - name: Run tests
      timeout-minutes: 3
      run: |
        pytest tests/ -v > test_results.log 2>&1
      env:
        SECRET_KEY: testing-secret-ci
        SENTRY_DSN: ""
        OPENAI_API_KEY: "sk-test-dummy-key-for-ci-only"

    - name: Commit test failure logs
      if: failure()
      run: |
        git config --global user.name "CI Bot"
        git config --global user.email "ci-bot@example.com"
        git add test_results.log
        git commit -m "ci: test failure log [skip ci]"
        git push origin main
