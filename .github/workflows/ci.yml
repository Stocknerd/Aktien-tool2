name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-flask black

    - name: Check formatting
      run: |
        black --check . || echo "Format warnings found"

    - name: Run tests
      run: |
        pytest tests/
      env:
        SECRET_KEY: testing-secret-ci
        SENTRY_DSN: ""
